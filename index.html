<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pro Scrabble Referee</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f1c0f; color: #f5e6c8; font-family: 'Montserrat', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Screens */
        .setup-screen, .score-screen { padding: 30px; display: flex; flex-direction: column; justify-content: center; height: 100vh; box-sizing: border-box; text-align: center; }
        .setup-screen h1 { color: #7ab648; font-size: 32px; margin-bottom: 40px; text-transform: uppercase; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: #7ab648; font-weight: 900; text-transform: uppercase;}
        .input-group input { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #2a3b2a; background: #1a261a; color: #f5e6c8; font-family: 'Montserrat'; font-weight: 600; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: #7ab648; }
        
        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; padding: 15px 20px; background: #1a261a; border-bottom: 2px solid #2a3b2a; align-items: center; }
        .player-score { display: flex; flex-direction: column; }
        .player-score.active { color: #7ab648; }
        .p-name { font-size: 12px; font-weight: 900; text-transform: uppercase; }
        .p-score { font-size: 24px; font-weight: 900; }
        
        /* Board */
        .board-wrapper { display: flex; justify-content: center; background: #222; padding: 2px; }
        .board { display: grid; grid-template-columns: repeat(15, 1fr); gap: 1px; width: 100vw; height: 100vw; box-sizing: border-box; }
        .cell { background: #1a261a; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; position: relative; text-transform: uppercase; color: #000; }
        .cell.tw { background: #ff4d4d; } .cell.tw::after { content: '3W'; font-size: 8px; color: white; }
        .cell.dw { background: #ffb3b3; } .cell.dw::after { content: '2W'; font-size: 8px; color: black; }
        .cell.tl { background: #3385ff; } .cell.tl::after { content: '3L'; font-size: 8px; color: white; }
        .cell.dl { background: #b3d1ff; } .cell.dl::after { content: '2L'; font-size: 8px; color: black; }
        .cell.center { background: #ffb3b3; } .cell.center::after { content: '★'; font-size: 12px; color: black; }
        .cell.tile { background: #f5e6c8; color: #000; border-radius: 2px; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); z-index: 2; }
        .cell.tile::after { content: ''; }
        
        /* Controls */
        .controls { flex: 1; padding: 15px 20px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .status-area { text-align: center; margin-bottom: 5px; }
        .hooking-text { color: #7ab648; font-weight: 900; font-size: 16px; text-transform: uppercase; margin: 0; }
        .error-text { color: #ff4d4d; font-weight: 900; font-size: 14px; margin-top: 5px; height: 18px; transition: opacity 0.3s; }
        
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; }
        .btn-action { background: #7ab648; color: #fff; }
        .btn-cancel { background: transparent; color: #c4a265; border: 2px solid #c4a265; }
        .btn-end { background: #c4a265; color: #000; }
        
        .winner-text { font-size: 40px; color: #7ab648; margin-bottom: 10px; }
        .final-score { font-size: 24px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const TW = new Set([0, 7, 14, 105, 119, 210, 217, 224]);
        const DW = new Set([16, 28, 32, 42, 48, 56, 64, 70, 154, 160, 168, 176, 182, 192, 196, 208]);
        const TL = new Set([20, 24, 76, 80, 84, 88, 136, 140, 144, 148, 200, 204]);
        const DL = new Set([3, 11, 36, 38, 45, 52, 59, 92, 96, 98, 102, 108, 116, 122, 126, 128, 132, 165, 172, 179, 186, 188, 213, 221]);
        const CENTER = 112;

        const ScrabbleApp = () => {
            const [appState, setAppState] = useState('SETUP'); // SETUP, GAME, GAMEOVER
            
            // Player State
            const [p1Name, setP1Name] = useState("PLAYER 1");
            const [p2Name, setP2Name] = useState("PLAYER 2");
            const [p1Score, setP1Score] = useState(0);
            const [p2Score, setP2Score] = useState(0);
            const [turn, setTurn] = useState(1); // 1 or 2

            // Board State
            const [board, setBoard] = useState(Array(225).fill(null));
            const [mode, setMode] = useState('IDLE');
            const [hookWord, setHookWord] = useState("");
            const [error, setError] = useState("");

            const startGame = () => {
                if (!p1Name) setP1Name("PLAYER 1");
                if (!p2Name) setP2Name("PLAYER 2");
                setAppState('GAME');
                setBoard(Array(225).fill(null));
                setP1Score(0);
                setP2Score(0);
                setTurn(1);
            };

            const getCellClass = (i, tile) => {
                if (tile) return 'cell tile';
                if (i === CENTER) return 'cell center';
                if (TW.has(i)) return 'cell tw';
                if (DW.has(i)) return 'cell dw';
                if (TL.has(i)) return 'cell tl';
                if (DL.has(i)) return 'cell dl';
                return 'cell';
            };

            const handleCellClick = (index) => {
                if (mode === 'IDLE') {
                    const word = prompt("Enter word to place:");
                    if (word) {
                        setHookWord(word.toUpperCase());
                        setMode('HOOKING');
                        setError("");
                    }
                } else {
                    placeWord(index);
                }
            };

            const placeWord = (startIndex) => {
                const direction = confirm("OK for Horizontal, Cancel for Vertical");
                const newBoard = [...board];
                let conflictFound = false;

                for (let i = 0; i < hookWord.length; i++) {
                    const currentIndex = direction ? startIndex + i : startIndex + (i * 15);
                    
                    if (currentIndex >= 225 || (direction && Math.floor(currentIndex/15) !== Math.floor(startIndex/15))) {
                        showError("WORD GOES OFF BOARD");
                        return;
                    }

                    if (newBoard[currentIndex] && newBoard[currentIndex] !== hookWord[i]) {
                        conflictFound = true;
                        break;
                    }
                    newBoard[currentIndex] = hookWord[i];
                }

                if (conflictFound) {
                    showError("CONFLICT DETECTED. TRY AGAIN.");
                } else {
                    setBoard(newBoard);
                    setMode('IDLE');
                    setHookWord("");
                }
            };

            const showError = (msg) => {
                setError(msg);
                setTimeout(() => setError(""), 3000);
            };

            const endTurn = () => {
                const pts = prompt(`Enter points scored by ${turn === 1 ? p1Name : p2Name} this turn:`);
                if (pts !== null && pts !== "") {
                    const numPts = parseInt(pts) || 0;
                    if (turn === 1) setP1Score(p1Score + numPts);
                    else setP2Score(p2Score + numPts);
                    setTurn(turn === 1 ? 2 : 1);
                }
            };

            const endGame = () => {
                if(confirm("Are you sure you want to end the game?")) {
                    setAppState('GAMEOVER');
                }
            };

            // ---- SCREENS ----

            if (appState === 'SETUP') {
                return (
                    <div className="setup-screen">
                        <h1>Scrabble Referee</h1>
                        <div className="input-group">
                            <label>Player 1 Name</label>
                            <input type="text" value={p1Name} onChange={(e) => setP1Name(e.target.value)} placeholder="Player 1" />
                        </div>
                        <div className="input-group">
                            <label>Player 2 Name</label>
                            <input type="text" value={p2Name} onChange={(e) => setP2Name(e.target.value)} placeholder="Player 2" />
                        </div>
                        <button className="btn btn-action" style={{marginTop: '20px'}} onClick={startGame}>START GAME</button>
                    </div>
                );
            }

            if (appState === 'GAMEOVER') {
                const p1Wins = p1Score > p2Score;
                const tie = p1Score === p2Score;
                return (
                    <div className="score-screen">
                        <h1>Game Over</h1>
                        <h2 className="winner-text">
                            {tie ? "IT'S A TIE!" : `${p1Wins ? p1Name : p2Name} WINS!`}
                        </h2>
                        <div className="final-score">
                            {p1Name}: {p1Score}<br/>
                            {p2Name}: {p2Score}
                        </div>
                        <button className="btn btn-action" onClick={() => setAppState('SETUP')}>NEW GAME</button>
                    </div>
                );
            }

            return (
                <div className="main-container">
                    <div className="top-bar">
                        <div className={`player-score ${turn === 1 ? 'active' : ''}`}>
                            <span className="p-name">{p1Name}</span>
                            <span className="p-score">{p1Score}</span>
                        </div>
                        <div className={`player-score ${turn === 2 ? 'active' : ''}`} style={{textAlign: 'right'}}>
                            <span className="p-name">{p2Name}</span>
                            <span className="p-score">{p2Score}</span>
                        </div>
                    </div>

                    <div className="board-wrapper">
                        <div className="board">
                            {board.map((tile, i) => (
                                <div key={i} className={getCellClass(i, tile)} onClick={() => handleCellClick(i)}>
                                    {tile}
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    <div className="controls">
                        <div className="status-area">
                            <p className="hooking-text">
                                {mode === 'HOOKING' ? `HOOKING "${hookWord}"` : `${turn === 1 ? p1Name : p2Name}'S TURN`}
                            </p>
                            <div className="error-text" style={{ opacity: error ? 1 : 0 }}>
                                {error}
                            </div>
                        </div>

                        {mode === 'HOOKING' ? (
                            <button className="btn btn-cancel" onClick={() => { setMode('IDLE'); setError(""); }}>
                                CANCEL HOOK
                            </button>
                        ) : (
                            <div className="btn-row">
                                <button className="btn btn-action" onClick={endTurn}>END TURN</button>
                                <button className="btn btn-end" onClick={endGame}>END GAME</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScrabbleApp />);
    </script>
</body>
</html>
