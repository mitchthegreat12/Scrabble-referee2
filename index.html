<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scrabble Referee v32</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background: #0f1c0f; color: #f5e6c8; font-family: 'Montserrat', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .splash-screen { position: fixed; inset: 0; background: #0f1c0f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; }
        .menu-btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-new { background: #f5e6c8; color: #000; }
        .btn-cont { background: #7ab648; color: #fff; }
        .btn-view-board { background: transparent; color: #c4a265; border: 2px solid #c4a265; }
        .btn-dict { background: #222; color: #c4a265; border: 1px solid #333; margin-top: 5px; font-size: 11px; padding: 12px; }
        .main-container { padding: 15px; box-sizing: border-box; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; flex-shrink: 0; }
        .score-card { padding: 10px; border-radius: 12px; border: 1px solid #333; background: rgba(255,255,255,0.03); text-align: center; transition: 0.3s; }
        .score-card.active { border-color: #7ab648; background: rgba(122,182,72,0.15); box-shadow: 0 0 10px rgba(122,182,72,0.2); }
        .word-log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 15px; border: 1px solid #222; }
        .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .scrabble-input { width: 100%; max-width: 320px; padding: 16px; background: #FFF; border: 4px solid #c4a265; color: #000; border-radius: 8px; text-align: center; font-size: 22px; font-weight: 900; display: block; margin: 0 auto; text-transform: uppercase; box-sizing: border-box; }
        
        .board-modal, .dict-modal { position: fixed; inset: 0; background: #0f1c0f; z-index: 8000; display: flex; flex-direction: column; }
        .board-grid { display: grid; grid-template-columns: repeat(15, 34px); gap: 1px; background: #444; width: fit-content; padding: 20px; margin: 0 auto; }
        .cell { background: #1a2e1a; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: bold; position: relative; color: rgba(255,255,255,0.1); }
        .cell.placed { background: #f5e6c8; color: #000; font-size: 16px; font-weight: 900; border-radius: 2px; }
        .tw { background: #ff4d4d; color: #fff; } .dw { background: #ffb3b3; color: #333; } .tl { background: #3399ff; color: #fff; } .dl { background: #b3d9ff; color: #333; }
        .pulse-hook { outline: 3px solid #7ab648; animation: pulse-glow 1s infinite; z-index: 5; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .active-cell { outline: 4px solid #fff; z-index: 10; }
        .controls-overlay { position: absolute; z-index: 100; display: grid; grid-template-areas: ". u ." "l . r" ". d ."; gap: 8px; background: rgba(0,0,0,0.95); padding: 12px; border-radius: 50%; border: 2px solid #c4a265; top: -55px; min-width: 100px; min-height: 100px; justify-items: center; align-items: center; }
        .arrow-btn { width: 38px; height: 38px; background: #c4a265; color: #000; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 900; font-size: 20px; }

        /* Dictionary Styling */
        .wheel-container { height: 80px; overflow-y: scroll; scroll-snap-type: y mandatory; background: #1a2e1a; margin-bottom: 10px; border: 1px solid #333; border-radius: 8px; position: relative; }
        .wheel-item { height: 40px; line-height: 40px; text-align: center; font-size: 18px; font-weight: 900; scroll-snap-align: center; color: #444; }
        .wheel-item.selected { color: #f5e6c8; font-size: 28px; }
        .wheel-marker { position: absolute; top: 20px; left: 0; right: 0; height: 40px; border-top: 1px solid #7ab648; border-bottom: 1px solid #7ab648; pointer-events: none; background: rgba(122,182,72,0.1); }
        .quick-ref-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 5px; max-height: 60px; overflow-y: auto; }
        .ref-tag { background: #222; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; color: #7ab648; border: 1px solid #333; }
        
        .definition-box { flex: 1; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid #222; overflow-y: auto; }
        .def-word { font-family: 'Playfair Display'; font-size: 24px; color: #7ab648; text-transform: uppercase; margin: 0; }
        .def-type { font-style: italic; color: #c4a265; font-size: 11px; display: block; margin-bottom: 10px; }
        .def-text { line-height: 1.5; font-size: 14px; color: #ddd; }
        .legal-badge { background: #7ab648; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; height: fit-content; }
        .invalid-badge { background: #ff4d4d; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; }
        
        .undo-chip { background: #444; color: #fff; border: none; padding: 5px 10px; border-radius: 6px; font-weight: 900; font-size: 10px; margin-left: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const L_VALS = { A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3, N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10 };
        const TW = [0, 7, 14, 105, 119, 210, 217, 224], DW = [16, 28, 32, 42, 48, 56, 64, 70, 112, 154, 160, 168, 176, 182, 192, 196, 208], TL = [20, 24, 76, 80, 84, 88, 136, 140, 144, 148, 200, 204], DL = [3, 11, 36, 38, 45, 52, 59, 92, 96, 98, 102, 108, 116, 122, 126, 128, 132, 165, 172, 179, 186, 188, 213, 221];
        const SCRABBLE_SHORT = { A:["AA","AB","AD","AE","AG","AH","AI","AL","AM","AN","AR","AS","AT","AW","AX","AY"], B:["BA","BE","BI","BO","BY"], J:["JO","JAB","JAG","JAM","JAR","JAW","JAY"], Q:["QI","QUA"], Z:["ZA","ZAG","ZAP"] };

        function App() {
            const [view, setView] = useState('splash');
            const [playerNames, setPlayerNames] = useState([]);
            const [scores, setScores] = useState([]);
            const [board, setBoard] = useState(Array(225).fill(null));
            const [activePlayer, setActivePlayer] = useState(0);
            const [history, setHistory] = useState([]);
            
            const [word, setWord] = useState("");
            const [pendingWord, setPendingWord] = useState(null);
            const [cursor, setCursor] = useState(null);
            const [validDirs, setValidDirs] = useState([]);

            // Dictionary States
            const [dictSearch, setDictSearch] = useState("");
            const [dictDef, setDictDef] = useState(null);
            const [selectedLetter, setSelectedLetter] = useState("A");

            const isBoardEmpty = useMemo(() => board.every(c => c === null), [board]);
            const legalHooks = useMemo(() => {
                if (isBoardEmpty) return [112];
                if (!pendingWord) return [];
                return board.map((tile, i) => (tile !== null && pendingWord.includes(tile)) ? i : null).filter(i => i !== null);
            }, [board, isBoardEmpty, pendingWord]);

            // Debounced Search Logic
            useEffect(() => {
                const timer = setTimeout(() => { if (dictSearch.length > 1) fetchDefinition(dictSearch); }, 600);
                return () => clearTimeout(timer);
            }, [dictSearch]);

            const fetchDefinition = async (w) => {
                if (!w) return;
                setDictDef({loading: true, searchWord: w});
                try {
                    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`);
                    const data = await res.json();
                    if (res.ok) {
                        setDictDef({ 
                            word: data[0].word, 
                            type: data[0].meanings[0].partOfSpeech, 
                            definition: data[0].meanings[0].definitions[0].definition,
                            isLegal: true 
                        });
                    } else { setDictDef({error: true, searchWord: w, isLegal: false}); }
                } catch { setDictDef({error: true, searchWord: w, isLegal: false}); }
            };

            const pushHistory = () => {
                setHistory(prev => [{ board: [...board], scores: JSON.parse(JSON.stringify(scores)), activePlayer }, ...prev].slice(0, 10));
            };

            const getPlacementDetails = (hookIdx, dir, wordStr, currentBoard) => {
                let actualStart, step, orientation;
                if (currentBoard.every(c => c === null)) {
                    if (dir === 'right') { actualStart = hookIdx; step = 1; orientation = 'h'; }
                    else if (dir === 'down') { actualStart = hookIdx; step = 15; orientation = 'v'; }
                } else {
                    const hookLetter = currentBoard[hookIdx];
                    const letterIndexInWord = wordStr.indexOf(hookLetter);
                    if (dir === 'right') { actualStart = hookIdx - letterIndexInWord; step = 1; orientation = 'h'; }
                    else if (dir === 'down') { actualStart = hookIdx - (letterIndexInWord * 15); step = 15; orientation = 'v'; }
                }
                return { actualStart, step, orientation };
            };

            const validateMove = (hookIdx, dir, wordStr, currentBoard) => {
                const details = getPlacementDetails(hookIdx, dir, wordStr, currentBoard);
                if (!details || details.actualStart < 0) return false;
                let curr = details.actualStart;
                for(let i=0; i<wordStr.length; i++) {
                    if (curr < 0 || curr >= 225) return false;
                    if (details.orientation === 'h' && Math.floor(curr/15) !== Math.floor(details.actualStart/15)) return false; 
                    if (currentBoard[curr] !== null && currentBoard[curr] !== wordStr[i]) return false; 
                    curr += details.step;
                }
                return true;
            };

            const executePlacement = (hookIdx, dir) => {
                const details = getPlacementDetails(hookIdx, dir, pendingWord, board);
                pushHistory();
                const nb = [...board];
                let curr = details.actualStart;
                let calculatedPoints = 0;
                let wordMult = 1;

                for(let i=0; i<pendingWord.length; i++) {
                    const letter = pendingWord[i];
                    const lVal = L_VALS[letter] || 0;
                    if (!nb[curr]) {
                        let letterMult = 1;
                        if (DL.includes(curr)) letterMult = 2;
                        if (TL.includes(curr)) letterMult = 3;
                        if (DW.includes(curr)) wordMult *= 2;
                        if (TW.includes(curr)) wordMult *= 3;
                        calculatedPoints += (lVal * letterMult);
                        nb[curr] = letter;
                    } else { calculatedPoints += lVal; }
                    curr += details.step;
                }

                const finalScore = (calculatedPoints * wordMult) + (pendingWord.length >= 7 ? 50 : 0);
                const nextScores = [...scores];
                nextScores[activePlayer] = [{id: Date.now(), w: pendingWord, s: finalScore}, ...nextScores[activePlayer]];
                
                setScores(nextScores);
                setBoard(nb);
                setPendingWord(null);
                setWord("");
                setCursor(null);
                setActivePlayer((prev) => (prev + 1) % playerNames.length);
                setView('scores');
            };

            if (view === 'splash') return (
                <div className="splash-screen">
                    <h1 style={{fontFamily:'Playfair Display', fontSize:'48px'}}>SCRABBLE</h1>
                    <button className="menu-btn btn-new" onClick={() => setView('setup-count')}>NEW GAME</button>
                    <button className="menu-btn btn-cont" onClick={() => setView('scores')} disabled={!scores.length}>CONTINUE</button>
                </div>
            );

            if (view === 'setup-count') return (
                <div className="splash-screen">
                    <h2>PLAYERS</h2>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px'}}>
                        {[1,2,3,4].map(n => <div key={n} style={{padding:'20px', border:'2px solid #c4a265', borderRadius:'8px', fontWeight:900}} onClick={() => { setPlayerNames(new Array(n).fill("").map((_, i) => `PLAYER ${i+1}`)); setView('setup-names'); }}>{n}</div>)}
                    </div>
                </div>
            );

            if (view === 'setup-names') return (
                <div className="splash-screen">
                    <h2>NAMES</h2>
                    {playerNames.map((n, i) => (
                        <input 
                            key={i} 
                            className="scrabble-input" 
                            style={{margin:'5px 0', fontSize:'16px'}} 
                            value={n} 
                            onFocus={(e) => { if(e.target.value.includes("PLAYER")) { const next = [...playerNames]; next[i] = ""; setPlayerNames(next); } }}
                            onChange={e => { const next = [...playerNames]; next[i] = e.target.value.toUpperCase(); setPlayerNames(next); }} 
                        />
                    ))}
                    <button className="menu-btn btn-cont" style={{marginTop:'20px'}} onClick={() => { setScores(new Array(playerNames.length).fill([])); setView('scores'); }}>START GAME</button>
                </div>
            );

            if (view === 'dictionary') return (
                <div className="dict-modal">
                    <div className="main-container">
                        <input className="scrabble-input" placeholder="SEARCH WORD..." value={dictSearch} onChange={(e) => setDictSearch(e.target.value.toUpperCase())} />
                        <div className="wheel-container" onScroll={(e) => setSelectedLetter("ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.round(e.target.scrollTop/40)])}>
                            <div className="wheel-marker"></div>
                            <div style={{height:'20px'}}></div>
                            {"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => <div key={l} className={`wheel-item ${selectedLetter===l?'selected':''}`}>{l}</div>)}
                            <div style={{height:'20px'}}></div>
                        </div>
                        <div className="quick-ref-box">
                            {(SCRABBLE_SHORT[selectedLetter] || []).map(w => <div key={w} className="ref-tag" onClick={() => {setDictSearch(w); fetchDefinition(w);}}>{w}</div>)}
                        </div>
                        <div className="definition-box">
                            {dictDef?.loading ? (
                                <div style={{textAlign:'center', padding:'20px'}}>SEARCHING...</div>
                            ) : dictDef?.isLegal ? (
                                <>
                                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
                                        <h2 className="def-word">{dictDef.word}</h2>
                                        <span className="legal-badge">LEGAL</span>
                                    </div>
                                    <span className="def-type">{dictDef.type}</span>
                                    <div className="def-text">{dictDef.definition}</div>
                                </>
                            ) : dictDef?.error ? (
                                <div style={{textAlign:'center', padding:'20px'}}>
                                    <h2 style={{color:'#ff4d4d', margin:0}}>{dictDef.searchWord}</h2>
                                    <div className="invalid-badge" style={{marginTop:'10px', display:'inline-block'}}>NOT A LEGAL WORD</div>
                                </div>
                            ) : (
                                <div style={{textAlign:'center', opacity:0.3, marginTop:'30px'}}>TYPE A WORD TO VERIFY</div>
                            )}
                        </div>
                        <button className="menu-btn btn-cont" onClick={() => setView('scores')}>CLOSE</button>
                    </div>
                </div>
            );

            return (
                <div className="main-container">
                    {view === 'scores' ? (
                        <>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <h1 style={{margin:0, fontFamily:'Playfair Display', fontSize:'22px'}}>SCRABBLE</h1>
                                {history.length > 0 && <button className="undo-chip" onClick={() => { setBoard(history[0].board); setScores(history[0].scores); setHistory(history.slice(1)); }}>UNDO</button>}
                            </div>
                            <div className="score-grid">
                                {playerNames.map((name, i) => (
                                    <div key={i} onClick={() => setActivePlayer(i)} className={`score-card ${activePlayer === i ? 'active' : ''}`}>
                                        <div style={{fontSize:'10px', color:'#c4a265', fontWeight:900}}>{name}</div>
                                        <div style={{fontSize:'32px', fontWeight:900}}>{scores[i]?.reduce((a,b)=>a+b.s,0) || 0}</div>
                                    </div>
                                ))}
                            </div>
                            <input className="scrabble-input" value={word} onChange={e => setWord(e.target.value.toUpperCase())} placeholder="TYPE WORD" />
                            <div style={{display:'flex', gap:'8px', marginTop:'10px'}}>
                                <button className="menu-btn btn-view-board" style={{flex:1}} onClick={() => { setPendingWord(null); setView('board'); }}>BOARD</button>
                                <button className="menu-btn btn-cont" style={{flex:1}} onClick={() => { setPendingWord(word); setView('board'); }} disabled={!word}>PLACE</button>
                            </div>
                            <div className="word-log">
                                {scores[activePlayer]?.map(e => <div key={e.id} className="log-entry"><span>{e.w}</span><span>+{e.s}</span></div>)}
                            </div>
                            <button className="menu-btn btn-dict" onClick={() => setView('dictionary')}>📖 DICTIONARY & LEGALITY</button>
                        </>
                    ) : (
                        <div className="board-modal">
                            <div style={{flex:1, overflow:'auto', background:'#111', display:'flex', alignItems:'center'}}>
                                <div className="board-grid">
                                    {board.map((tile, i) => {
                                        const isHook = pendingWord && legalHooks.includes(i);
                                        const showArrows = cursor === i && pendingWord;
                                        return (
                                            <div key={i} onClick={() => { if(!legalHooks.includes(i)) return; setCursor(i); setValidDirs(['right','down'].filter(d => validateMove(i, d, pendingWord, board))); }} className={`cell ${tile?'placed':''} ${cursor===i?'active-cell':''} ${isHook?'pulse-hook':''}`}>
                                                {tile || ''}
                                                {showArrows && (
                                                    <div className="controls-overlay" onClick={e => e.stopPropagation()}>
                                                        {validDirs.map(d => <div key={d} className="arrow-btn" style={{gridArea: d[0]}} onClick={() => executePlacement(i, d)}>{d==='down'?'↓':'→'}</div>)}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <button className="menu-btn btn-cont" onClick={()=>setView('scores')}>BACK</button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
