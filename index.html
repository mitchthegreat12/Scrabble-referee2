<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pro Scrabble Referee</title>
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/5/5d/Scrabble_tile_S.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #0f1c0f; color: #f5e6c8; font-family: 'Montserrat', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .main-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .board { 
            display: grid; 
            grid-template-columns: repeat(15, 1fr); 
            gap: 1px; 
            background: #222; 
            padding: 2px; 
            width: 100vw; 
            height: 100vw; 
            box-sizing: border-box;
        }
        .cell { 
            background: #1a261a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: 900; 
            position: relative;
            text-transform: uppercase;
        }
        .cell.tw { background: #ff4d4d; } .cell.dw { background: #ffb3b3; }
        .cell.tl { background: #3385ff; } .cell.dl { background: #b3d1ff; }
        .cell.tile { background: #f5e6c8; color: #000; border-radius: 2px; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2); }
        
        .controls { flex: 1; padding: 20px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .status-area { text-align: center; margin-bottom: 10px; }
        .hooking-text { color: #7ab648; font-weight: 900; font-size: 18px; text-transform: uppercase; margin: 0; }
        .error-text { color: #ff4d4d; font-weight: 600; font-size: 14px; margin-top: 5px; height: 18px; transition: opacity 0.3s; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-family: 'Montserrat'; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        .btn-action { background: #7ab648; color: #fff; }
        .btn-cancel { background: transparent; color: #c4a265; border: 2px solid #c4a265; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const ScrabbleApp = () => {
            const [board, setBoard] = useState(Array(225).fill(null));
            const [mode, setMode] = useState('IDLE'); // IDLE or HOOKING
            const [hookWord, setHookWord] = useState("");
            const [error, setError] = useState("");

            const handleCellClick = (index) => {
                if (mode === 'IDLE') {
                    const word = prompt("Enter word to hook:");
                    if (word) {
                        setHookWord(word.toUpperCase());
                        setMode('HOOKING');
                        setError("");
                    }
                } else {
                    placeWord(index);
                }
            };

            const placeWord = (startIndex) => {
                const direction = confirm("OK for Horizontal, Cancel for Vertical");
                const newBoard = [...board];
                let conflictFound = false;

                for (let i = 0; i < hookWord.length; i++) {
                    const currentIndex = direction ? startIndex + i : startIndex + (i * 15);
                    
                    // Boundary check
                    if (currentIndex >= 225 || (direction && Math.floor(currentIndex/15) !== Math.floor(startIndex/15))) {
                        showError("WORD GOES OFF BOARD");
                        return;
                    }

                    if (newBoard[currentIndex] && newBoard[currentIndex] !== hookWord[i]) {
                        conflictFound = true;
                        break;
                    }
                    newBoard[currentIndex] = hookWord[i];
                }

                if (conflictFound) {
                    showError("CONFLICT DETECTED");
                } else {
                    setBoard(newBoard);
                    setMode('IDLE');
                    setHookWord("");
                }
            };

            const showError = (msg) => {
                setError(msg);
                setTimeout(() => setError(""), 3000); // Disappears after 3 seconds
            };

            return (
                <div className="main-container">
                    <div className="board">
                        {board.map((tile, i) => (
                            <div key={i} className={`cell ${tile ? 'tile' : ''}`} onClick={() => handleCellClick(i)}>
                                {tile}
                            </div>
                        ))}
                    </div>
                    
                    <div className="controls">
                        <div className="status-area">
                            <p className="hooking-text">
                                {mode === 'HOOKING' ? `HOOKING "${hookWord}"` : "TAP BOARD TO START"}
                            </p>
                            <div className="error-text" style={{ opacity: error ? 1 : 0 }}>
                                {error}
                            </div>
                        </div>

                        {mode === 'HOOKING' && (
                            <button className="btn btn-cancel" onClick={() => { setMode('IDLE'); setError(""); }}>
                                CANCEL HOOK
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ScrabbleApp />);
    </script>
</body>
</html>
