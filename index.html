<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scrabble Referee v48</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&family=Playfair+Display:wght@900&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --leather-bg: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 60%), linear-gradient(135deg, #2b0f0f 0%, #110505 100%);
            --wood-gradient: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px), linear-gradient(to bottom, #6d2a18 0%, #3a150b 100%);
            --tan-linen: repeating-linear-gradient(to right, rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 4px), repeating-linear-gradient(to bottom, rgba(0,0,0,0.04) 0, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 4px), #a39171;
            --green-linen: repeating-linear-gradient(to right, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px), repeating-linear-gradient(to bottom, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px), #5b6d44;
            --parchment: #f4edd8;
        }

        body { margin: 0; background-image: var(--leather-bg); color: #f5e6c8; font-family: 'Montserrat', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .main-container { padding: 15px; box-sizing: border-box; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .app-header { font-family: 'Playfair Display'; color: #c4a265; font-size: 24px; margin: 0 0 15px 0; text-transform: uppercase; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .score-card { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #3d2d1d; transition: 0.3s; }
        .score-card.active { background: var(--green-linen); color: #fff; border: 2px solid #7ab648; }
        .score-card.inactive { background: var(--tan-linen); color: #3d2d1d; }

        .scrabble-input { width: 100%; max-width: 350px; padding: 16px; background: var(--parchment); border: 4px solid #4a1d13; border-radius: 8px; text-align: center; font-size: 22px; font-weight: 900; color: #3a150b; text-transform: uppercase; margin: 0 auto; display: block; }
        .input-valid { border-color: #5b6d44 !important; box-shadow: 0 0 15px rgba(91,109,68,0.4); }

        .anchor-picker { display: flex; justify-content: center; gap: 4px; margin: 10px 0; }
        .anchor-tile { width: 35px; height: 40px; background: var(--parchment); color: #000; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 2px solid transparent; }
        .anchor-tile.selected { border-color: #7ab648; background: #fff; transform: translateY(-3px); }

        .btn-wood, .btn-green-linen { border-radius: 10px; padding: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-family: 'Montserrat'; width: 100%; }
        .btn-wood { background: var(--wood-gradient); color: #f5e6c8; border: 1px solid #1f0b05; box-shadow: 0 4px 0 #1f0b05; }
        .btn-green-linen { background: var(--green-linen); color: #fff; border: 1px solid #3d4a2a; box-shadow: 0 4px 0 #2b3a1a; }

        .board-modal { position: fixed; inset: 0; background: var(--leather-bg); z-index: 8000; display: flex; flex-direction: column; }
        .board-wrapper { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .board-grid { display: grid; grid-template-columns: repeat(15, 38px); gap: 1px; background: #222; border: 4px solid #3a150b; padding: 2px; }
        .cell { background: #1a241a; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 8px; font-weight: bold; }
        
        .tw { background: #8b2222 !important; } .dw { background: #b56c6c !important; } .tl { background: #2b5c8f !important; } .dl { background: #6c98b5 !important; }
        .tile { background: var(--parchment); color: #000; width: 96%; height: 96%; border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; position: relative; }
        .base-pts { position: absolute; bottom: 2px; right: 3px; font-size: 8px; }

        .active-cell { outline: 3px solid #f5e6c8; z-index: 10; }
        .pulse-hook { outline: 2px solid #5b6d44; animation: pulse-glow 1.5s infinite; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .controls-overlay { position: absolute; z-index: 100; display: grid; grid-template-areas: ". u ." "l . r" ". d ."; gap: 8px; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 50%; border: 2px solid #c4a265; top: -65px; left: 50%; transform: translateX(-50%); }
        .arrow-btn { width: 42px; height: 42px; background: var(--wood-gradient); color: #f5e6c8; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 24px; }

        .bingo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .bingo-card { background: var(--parchment); color: #000; padding: 30px; border-radius: 12px; border: 4px solid #5b6d44; text-align: center; width: 80%; }
        
        .word-log { flex: 1; overflow-y: auto; background: var(--tan-linen); border-radius: 6px; padding: 15px; margin-top: 15px; color: #2b1d0e; }
        .log-entry { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.08); font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const L_VALS = { A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3, N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10 };
        const TW = [0, 7, 14, 105, 119, 210, 217, 224], DW = [16, 28, 32, 42, 48, 56, 64, 70, 154, 160, 168, 176, 182, 192, 196, 208], TL = [20, 24, 76, 80, 84, 88, 136, 140, 144, 148, 200, 204], DL = [3, 11, 36, 38, 45, 52, 59, 92, 96, 98, 102, 108, 116, 122, 126, 128, 132, 165, 172, 179, 186, 188, 213, 221];

        function App() {
            const [view, setView] = useState('splash');
            const [playerNames, setPlayerNames] = useState([]);
            const [scores, setScores] = useState([]);
            const [board, setBoard] = useState(Array(225).fill(null));
            const [activePlayer, setActivePlayer] = useState(0);
            const [word, setWord] = useState("");
            const [anchorIdx, setAnchorIdx] = useState(0);
            const [isValidWord, setIsValidWord] = useState(null);
            const [pendingWord, setPendingWord] = useState(null);
            const [cursor, setCursor] = useState(null);
            const [validDirs, setValidDirs] = useState([]);
            const [showBingo, setShowBingo] = useState(null);

            const isBoardEmpty = board.every(c => c === null);
            const legalHooks = useMemo(() => {
                if (isBoardEmpty) return [112];
                if (!pendingWord) return [];
                const hooks = [];
                board.forEach((tile, i) => { if (tile === pendingWord[anchorIdx]) hooks.push(i); });
                return hooks;
            }, [board, pendingWord, anchorIdx]);

            useEffect(() => {
                if (word.length < 2) { setIsValidWord(null); return; }
                const timer = setTimeout(async () => {
                    try {
                        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
                        setIsValidWord(res.ok);
                    } catch { setIsValidWord(false); }
                }, 400);
                return () => clearTimeout(timer);
            }, [word]);

            const validateMove = (hookIdx, dir, wordStr, currentBoard) => {
                const step = dir === 'right' ? 1 : 15;
                const start = hookIdx - (anchorIdx * step);
                if (start < 0) return false;
                for(let i=0; i<wordStr.length; i++) {
                    const curr = start + (i * step);
                    if (curr < 0 || curr >= 225) return false;
                    if (dir === 'right' && Math.floor(curr/15) !== Math.floor(start/15)) return false; 
                    if (currentBoard[curr] !== null && (curr !== hookIdx || currentBoard[curr] !== wordStr[i])) return false;
                }
                return true;
            };

            const executePlacement = (hookIdx, dir) => {
                const step = dir === 'right' ? 1 : 15;
                const start = hookIdx - (anchorIdx * step);
                const nb = [...board];
                let pts = 0, mult = 1;

                for(let i=0; i<pendingWord.length; i++) {
                    const curr = start + (i * step);
                    const letter = pendingWord[i];
                    if (!nb[curr]) {
                        let lMult = DL.includes(curr)?2:TL.includes(curr)?3:1;
                        if (DW.includes(curr) || curr === 112) mult *= 2;
                        if (TW.includes(curr)) mult *= 3;
                        pts += (L_VALS[letter] * lMult);
                        nb[curr] = letter;
                    } else { pts += L_VALS[letter]; }
                }

                const bingo = pendingWord.length >= 7 ? 50 : 0;
                const finalPts = (pts * mult) + bingo;
                
                // STEP 1: DROP TILES IMMEDIATELY
                setBoard(nb);
                setCursor(null);

                // STEP 2: IF BINGO, SHOW POPUP IMMEDIATELY
                if (bingo > 0) {
                    setShowBingo({w: pendingWord, s: finalPts, nb});
                } else {
                    // STEP 3: IF NO BINGO, WAIT 1.5S THEN GO BACK
                    setTimeout(() => finalizeTurn(pendingWord, finalPts, nb), 1500);
                }
            };

            const finalizeTurn = (w, s, nextBoard) => {
                const nextScores = [...scores];
                nextScores[activePlayer] = [{id: Date.now(), w, s}, ...nextScores[activePlayer]];
                setScores(nextScores);
                setPendingWord(null); setWord(""); setIsValidWord(null); setShowBingo(null);
                setActivePlayer((prev) => (prev + 1) % playerNames.length);
                setView('scores');
            };

            const handleBingoOk = () => {
                const data = showBingo;
                setShowBingo(null); // Remove popup
                // STEP 4: WAIT 1.5S AFTER OKAY BEFORE REVERTING
                setTimeout(() => finalizeTurn(data.w, data.s, data.nb), 1500);
            };

            if (view === 'splash') return (
                <div className="splash-screen" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh'}}>
                    <h1 className="app-header" style={{fontSize:48}}>SCRABBLE</h1>
                    <button className="btn-wood" style={{width:220}} onClick={() => setView('setup-count')}>NEW GAME</button>
                </div>
            );

            if (view === 'setup-count') return (
                <div className="splash-screen" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh'}}>
                    <h2 className="app-header">PLAYERS</h2>
                    <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:15}}>
                        {[1,2,3,4].map(n => <button key={n} className="btn-wood" onClick={() => { setPlayerNames(new Array(n).fill("").map((_, i) => `PLAYER ${i+1}`)); setView('setup-names'); }}>{n}</button>)}
                    </div>
                </div>
            );

            if (view === 'setup-names') return (
                <div className="splash-screen" style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh'}}>
                    <h2 className="app-header">NAMES</h2>
                    {playerNames.map((n, i) => <input key={i} className="scrabble-input" style={{margin:'5px 0'}} value={n} onChange={e => { const next = [...playerNames]; next[i] = e.target.value.toUpperCase(); setPlayerNames(next); }} />)}
                    <button className="btn-green-linen" style={{marginTop:20, width:200}} onClick={() => { setScores(new Array(playerNames.length).fill([])); setView('scores'); }}>START</button>
                </div>
            );

            return (
                <div className="main-container">
                    {showBingo && (
                        <div className="bingo-overlay">
                            <div className="bingo-card">
                                <h2 style={{fontFamily:'Orbitron', color:'#5b6d44', fontSize:32, margin:0}}>BINGO!</h2>
                                <p style={{fontWeight:900, fontSize:18}}>+50 BONUS</p>
                                <button className="btn-green-linen" onClick={handleBingoOk}>OKAY</button>
                            </div>
                        </div>
                    )}

                    {view === 'scores' ? (
                        <>
                            <h1 className="app-header">SCRABBLE</h1>
                            <div className="score-grid">
                                {playerNames.map((name, i) => (
                                    <div key={i} className={`score-card ${activePlayer === i ? 'active' : 'inactive'}`}>
                                        <div className="player-label">{name}</div>
                                        <div className="player-score">{scores[i]?.reduce((a,b)=>a+b.s,0) || 0}</div>
                                    </div>
                                ))}
                            </div>
                            <input className={`scrabble-input ${isValidWord === true ? 'input-valid' : ''}`} value={word} onChange={e => setWord(e.target.value.toUpperCase())} placeholder="ENTER WORD" />
                            {word.length > 1 && (
                                <div className="anchor-picker">
                                    {word.split('').map((char, i) => <div key={i} className={`anchor-tile ${anchorIdx === i ? 'selected' : ''}`} onClick={() => setAnchorIdx(i)}>{char}</div>)}
                                </div>
                            )}
                            <div style={{display:'flex', gap:10, marginTop:15}}>
                                <button className="btn-wood" onClick={() => { setPendingWord(null); setView('board'); }}>BOARD</button>
                                <button className="btn-green-linen" onClick={() => { setPendingWord(word); setView('board'); }} disabled={!isValidWord}>PLACE</button>
                            </div>
                            <div className="word-log">
                                {scores[activePlayer]?.map(e => <div key={e.id} className="log-entry"><span>{e.w}</span><span style={{color:'#5b6d44'}}>+{e.s}</span></div>)}
                            </div>
                        </>
                    ) : (
                        <div className="board-modal">
                            <div className="board-wrapper">
                                <div className="board-grid">
                                    {board.map((tile, i) => {
                                        const isHook = pendingWord && legalHooks.includes(i);
                                        const isStar = i === 112; const isDL = DL.includes(i); const isTL = TL.includes(i); const isDW = DW.includes(i); const isTW = TW.includes(i);
                                        return (
                                            <div key={i} onClick={() => { if(isHook) { setCursor(i); setValidDirs(['right','down'].filter(d => validateMove(i, d, pendingWord, board))); } }} className={`cell ${isTW?'tw':isDW?'dw':isTL?'tl':isDL?'dl':''} ${cursor===i?'active-cell':''} ${isHook?'pulse-hook':''}`}>
                                                {tile ? <div className="tile">{tile}<div className="base-pts">{L_VALS[tile]}</div></div> : (isStar?'★':isTW?'3W':isDW?'2W':isTL?'3L':isDL?'2L':'')}
                                                {cursor === i && pendingWord && (
                                                    <div className="controls-overlay" onClick={e => e.stopPropagation()}>
                                                        {validDirs.map(d => <div key={d} className="arrow-btn" style={{gridArea: d[0]}} onClick={() => executePlacement(i, d)}>{d==='down'?'↓':'→'}</div>)}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                            <div style={{padding:15, background:'#110505'}}><button className="btn-green-linen" onClick={()=>setView('scores')}>BACK</button></div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
