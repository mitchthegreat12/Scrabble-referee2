<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Scrabble Referee v30</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { margin: 0; background: #0f1c0f; color: #f5e6c8; font-family: 'Montserrat', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .splash-screen { position: fixed; inset: 0; background: #0f1c0f; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; }
        .menu-btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-family: 'Montserrat'; font-weight: 900; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-new { background: #f5e6c8; color: #000; }
        .btn-cont { background: #7ab648; color: #fff; }
        .btn-view-board { background: transparent; color: #c4a265; border: 2px solid #c4a265; }
        .btn-dict { background: #222; color: #c4a265; border: 1px solid #333; margin-top: 5px; font-size: 11px; padding: 12px; }
        .main-container { padding: 15px; box-sizing: border-box; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        .score-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 12px 0; flex-shrink: 0; }
        .score-card { padding: 10px; border-radius: 12px; border: 1px solid #333; background: rgba(255,255,255,0.03); text-align: center; }
        .score-card.active { border-color: #7ab648; background: rgba(122,182,72,0.15); }
        .word-log { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; margin-top: 15px; border: 1px solid #222; }
        .log-entry { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .scrabble-input { width: 100%; max-width: 320px; padding: 16px; background: #FFF; border: 4px solid #c4a265; color: #000; border-radius: 8px; text-align: center; font-size: 22px; font-weight: 900; display: block; margin: 0 auto; text-transform: uppercase; box-sizing: border-box; }
        
        /* Board Styles */
        .board-modal, .dict-modal { position: fixed; inset: 0; background: #0f1c0f; z-index: 8000; display: flex; flex-direction: column; }
        .board-grid { display: grid; grid-template-columns: repeat(15, 34px); gap: 1px; background: #444; width: fit-content; padding: 20px; margin: 0 auto; }
        .cell { background: #1a2e1a; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: bold; position: relative; color: rgba(255,255,255,0.1); }
        .cell.placed { background: #f5e6c8; color: #000; font-size: 16px; font-weight: 900; border-radius: 2px; }
        .tw { background: #ff4d4d; color: #fff; } .dw { background: #ffb3b3; color: #333; } .tl { background: #3399ff; color: #fff; } .dl { background: #b3d9ff; color: #333; }
        .pulse-hook { outline: 3px solid #7ab648; animation: pulse-glow 1s infinite; z-index: 5; }
        @keyframes pulse-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .active-cell { outline: 4px solid #fff; z-index: 10; }
        .controls-overlay { position: absolute; z-index: 100; display: grid; grid-template-areas: ". u ." "l . r" ". d ."; gap: 8px; background: rgba(0,0,0,0.95); padding: 12px; border-radius: 50%; border: 2px solid #c4a265; top: -55px; min-width: 100px; min-height: 100px; justify-items: center; align-items: center; }
        .arrow-btn { width: 38px; height: 38px; background: #c4a265; color: #000; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 900; font-size: 20px; }

        /* Updated Dictionary Styles */
        .dict-header { padding: 10px 0; text-align: center; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .wheel-container { height: 100px; overflow-y: scroll; scroll-snap-type: y mandatory; background: #1a2e1a; margin-bottom: 10px; border: 1px solid #333; border-radius: 8px; position: relative; }
        .wheel-item { height: 50px; line-height: 50px; text-align: center; font-size: 20px; font-weight: 900; scroll-snap-align: center; color: #444; }
        .wheel-item.selected { color: #f5e6c8; font-size: 32px; }
        .wheel-marker { position: absolute; top: 25px; left: 0; right: 0; height: 50px; border-top: 1px solid #7ab648; border-bottom: 1px solid #7ab648; pointer-events: none; background: rgba(122,182,72,0.1); }
        
        .quick-ref-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; max-height: 80px; overflow-y: auto; border: 1px solid #222; }
        .ref-tag { background: #222; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 900; color: #7ab648; border: 1px solid #333; }
        
        .definition-box { flex: 1; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; overflow-y: auto; border: 1px solid #222; }
        .def-word { font-family: 'Playfair Display'; font-size: 28px; color: #7ab648; margin-bottom: 2px; text-transform: uppercase; }
        .def-type { font-style: italic; color: #c4a265; font-size: 12px; margin-bottom: 12px; display: block; }
        .def-text { line-height: 1.6; font-size: 14px; color: #ddd; }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .search-row input { flex: 1; font-size: 16px; padding: 12px; text-align: left; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const L_VALS = { A:1, B:3, C:3, D:2, E:1, F:4, G:2, H:4, I:1, J:8, K:5, L:1, M:3, N:1, O:1, P:3, Q:10, R:1, S:1, T:1, U:1, V:4, W:4, X:8, Y:4, Z:10 };
        const TW = [0, 7, 14, 105, 119, 210, 217, 224], DW = [16, 28, 32, 42, 48, 56, 64, 70, 112, 154, 160, 168, 176, 182, 192, 196, 208], TL = [20, 24, 76, 80, 84, 88, 136, 140, 144, 148, 200, 204], DL = [3, 11, 36, 38, 45, 52, 59, 92, 96, 98, 102, 108, 116, 122, 126, 128, 132, 165, 172, 179, 186, 188, 213, 221];
        
        // Official Scrabble 2-3 Letter Words for Quick Ref
        const SCRABBLE_SHORT = {
            A: ["AA","AB","AD","AE","AG","AH","AI","AL","AM","AN","AR","AS","AT","AW","AX","AY"],
            B: ["BA","BE","BI","BO","BY","BAD","BAG","BAH","BAM","BAN","BAP","BAR","BAS","BAT","BAY"],
            C: ["CH","CAB","CAD","CAM","CAN","CAP","CAR","CAT","CAW","CAY","CEE","CEL","CEP","CHI"],
            D: ["DA","DE","DI","DO","DAB","DAD","DAG","DAH","DAK","DAL","DAM","DAN","DAP","DAS","DAW"],
            J: ["JO","JAB","JAG","JAM","JAR","JAW","JAY","JEE","JET","JEU","JEW","JIB","JIG","JIN","JOB"],
            Q: ["QI","QUA","SUQ"], 
            Z: ["ZA","ZAG","ZAP","ZAS","ZAX","ZED","ZEE","ZEK","ZEN","ZEP","ZIG","ZIN","ZIP","ZIT","ZOA"]
        };

        function App() {
            const [view, setView] = useState('splash');
            const [playerNames, setPlayerNames] = useState([]);
            const [scores, setScores] = useState([]);
            const [board, setBoard] = useState(Array(225).fill(null));
            const [activePlayer, setActivePlayer] = useState(0);
            const [word, setWord] = useState("");
            const [pendingWord, setPendingWord] = useState(null);
            const [cursor, setCursor] = useState(null);
            
            // Dictionary States
            const [dictSearch, setDictSearch] = useState("");
            const [dictDef, setDictDef] = useState(null);
            const [selectedLetter, setSelectedLetter] = useState("A");
            const wheelRef = useRef(null);

            // AUTO-SEARCH Logic (Debounce)
            useEffect(() => {
                const delayDebounceFn = setTimeout(() => {
                    if (dictSearch.length > 1) {
                        fetchDefinition(dictSearch);
                    }
                }, 600);
                return () => clearTimeout(delayDebounceFn);
            }, [dictSearch]);

            const fetchDefinition = async (w) => {
                if (!w || w.length < 2) return;
                setDictDef({loading: true});
                try {
                    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w.toLowerCase()}`);
                    const data = await res.json();
                    if (res.ok) {
                        setDictDef({
                            word: data[0].word,
                            type: data[0].meanings[0].partOfSpeech,
                            definition: data[0].meanings[0].definitions[0].definition
                        });
                    } else {
                        setDictDef({error: "Word not found in official dictionary."});
                    }
                } catch {
                    setDictDef({error: "Search failed. Check connection."});
                }
            };

            const handleWheelScroll = (e) => {
                const scrollTop = e.target.scrollTop;
                const index = Math.round(scrollTop / 50);
                const letter = "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[index];
                if (letter && letter !== selectedLetter) {
                    setSelectedLetter(letter);
                }
            };

            if (view === 'splash') return (
                <div className="splash-screen">
                    <h1 style={{fontFamily:'Playfair Display', fontSize:'48px', marginBottom:'40px'}}>SCRABBLE</h1>
                    <button className="menu-btn btn-new" onClick={() => setView('setup-count')}>NEW GAME</button>
                    <button className="menu-btn btn-cont" onClick={() => setView('scores')} disabled={!localStorage.getItem("scr_v28_scores")}>CONTINUE</button>
                </div>
            );

            if (view === 'setup-count') return (
                <div className="splash-screen">
                    <h2 style={{marginBottom:'20px'}}>PLAYERS</h2>
                    <div style={{display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px', width:'100%', maxWidth:'300px'}}>
                        {[1,2,3,4].map(n => (
                            <div key={n} style={{aspectRatio:'1', border:'2px solid #c4a265', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'24px', fontWeight:'900'}} 
                                 onClick={() => { setPlayerNames(new Array(n).fill("").map((_, i) => `PLAYER ${i+1}`)); setView('setup-names'); }}>{n}</div>
                        ))}
                    </div>
                </div>
            );

            if (view === 'setup-names') return (
                <div className="splash-screen">
                    <h2 style={{marginBottom:'20px'}}>NAMES</h2>
                    {playerNames.map((n, i) => (
                        <input key={i} className="scrabble-input" style={{margin:'5px 0', fontSize:'16px'}} value={n} 
                               onChange={e => { const next = [...playerNames]; next[i] = e.target.value.toUpperCase(); setPlayerNames(next); }} />
                    ))}
                    <button className="menu-btn btn-cont" onClick={() => { setScores(new Array(playerNames.length).fill([])); setView('scores'); }}>START GAME</button>
                </div>
            );

            if (view === 'dictionary') return (
                <div className="dict-modal">
                    <div className="main-container">
                        <div className="dict-header">
                            <h2 style={{margin:0, fontFamily:'Playfair Display'}}>OFFICIAL LOOKUP</h2>
                        </div>
                        
                        <div className="search-row">
                            <input 
                                className="scrabble-input" 
                                placeholder="TYPE WORD..." 
                                value={dictSearch}
                                onChange={(e) => setDictSearch(e.target.value.toUpperCase())}
                            />
                            <button onClick={() => fetchDefinition(dictSearch)} style={{background:'#7ab648', border:'none', color:'#fff', padding:'0 15px', borderRadius:'8px', fontWeight:900}}>GO</button>
                        </div>

                        <div className="wheel-container" onScroll={handleWheelScroll}>
                            <div className="wheel-marker"></div>
                            <div style={{height: '25px'}}></div>
                            {"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l => (
                                <div key={l} className={`wheel-item ${selectedLetter === l ? 'selected' : ''}`}>{l}</div>
                            ))}
                            <div style={{height: '25px'}}></div>
                        </div>

                        <div style={{fontSize:'9px', fontWeight:900, marginBottom:'5px', color:'#c4a265'}}>SCRABBLE ESSENTIALS ({selectedLetter})</div>
                        <div className="quick-ref-box">
                            {(SCRABBLE_SHORT[selectedLetter] || ["NO SHORT LIST"]).map(w => (
                                <div key={w} className="ref-tag" onClick={() => {setDictSearch(w); fetchDefinition(w);}}>{w}</div>
                            ))}
                        </div>

                        <div className="definition-box">
                            {dictDef?.loading ? <div style={{textAlign:'center', padding:'20px'}}>SEARCHING...</div> :
                             dictDef?.error ? <div style={{color:'#ff4d4d', textAlign:'center'}}>{dictDef.error}</div> :
                             dictDef ? (
                                <>
                                    <div className="def-word">{dictDef.word}</div>
                                    <span className="def-type">{dictDef.type}</span>
                                    <div className="def-text">{dictDef.definition}</div>
                                </>
                            ) : <div style={{textAlign:'center', opacity:0.3, marginTop:'30px'}}>SEARCH A WORD ABOVE</div>}
                        </div>

                        <button className="menu-btn btn-cont" style={{marginTop:'15px'}} onClick={() => setView('scores')}>CLOSE</button>
                    </div>
                </div>
            );

            return (
                <div className="main-container">
                    {view === 'scores' ? (
                        <>
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <h1 style={{margin:0, fontSize:'22px', fontFamily:'Playfair Display'}}>SCRABBLE</h1>
                                <button onClick={() => setView('splash')} style={{background:'none', border:'1px solid #444', color:'#444', padding:'5px 12px', borderRadius:'6px', fontWeight:900, fontSize:'10px'}}>MENU</button>
                            </div>
                            <div className="score-grid">
                                {playerNames.map((name, i) => (
                                    <div key={i} onClick={() => setActivePlayer(i)} className={`score-card ${activePlayer === i ? 'active' : ''}`}>
                                        <div style={{fontSize:"10px", color:'#c4a265', fontWeight:900}}>{name}</div>
                                        <div style={{fontSize:"32px", fontWeight:"900"}}>{scores[i]?.reduce((a,b)=>a+b.s,0) || 0}</div>
                                    </div>
                                ))}
                            </div>
                            
                            <input className="scrabble-input" value={word} onChange={e => setWord(e.target.value.toUpperCase())} placeholder="TYPE WORD" />
                            
                            <div style={{display:'flex', gap:'8px', marginTop:'10px'}}>
                                <button className="menu-btn btn-view-board" style={{flex:1}} onClick={() => { setPendingWord(null); setView('board'); }}>BOARD</button>
                                <button className="menu-btn btn-cont" style={{flex:1}} onClick={() => { setPendingWord(word); setView('board'); }} disabled={!word}>PLACE</button>
                            </div>

                            <div className="word-log">
                                <div style={{fontSize:'9px', fontWeight:900, color:'#555', marginBottom:'8px', textAlign:'center'}}>HISTORY</div>
                                {scores[activePlayer]?.map((entry, idx) => (
                                    <div key={idx} className="log-entry">
                                        <span style={{fontWeight:900}}>{entry.w}</span>
                                        <span style={{color:'#7ab648'}}>+{entry.s}</span>
                                    </div>
                                ))}
                            </div>
                            
                            <button className="menu-btn btn-dict" onClick={() => setView('dictionary')}>📖 OPEN DICTIONARY & QUICK-REF</button>
                        </>
                    ) : (
                        <div className="board-modal">
                             <div style={{flex:1, overflow:'auto', background:'#111', display:'flex', alignItems:'center'}}>
                                <div className="board-grid">
                                    {board.map((tile, i) => (
                                        <div key={i} className={`cell ${tile?'placed':''}`}>{tile || ''}</div>
                                    ))}
                                </div>
                            </div>
                            <button className="menu-btn btn-cont" onClick={()=>setView('scores')}>BACK TO GAME</button>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
